# =============================================================================
# Example 3: Missing probes
# =============================================================================
#
# WHAT THIS TESTS:
#   The container is healthy, but has NO liveness, readiness, or startup probes
#   configured. Kubernetes cannot detect when the application is unhealthy, so
#   the deployment may look "running" while actually being broken.
#
#   This reproduces the "missing" probe profile in analyze_probes.
#
# EXPECTED AGENT BEHAVIOUR (Workflow 2):
#   1. analyze_deployment flags missing probes as a medium-severity finding
#   2. analyze_probes classifies the profile as "missing" and returns a
#      suggestedProbeConfig with safe default values for all three probes
#   3. After user approval, execute_action patches the probes in
#   4. analyze_deployment is called again and confirms the deployment is healthy
#      and now has observable health
#
# HOW TO APPLY:
#   kubectl apply -f 03-bad-probes-missing.yaml
#
# HOW TO TRIGGER THE AGENT:
#   In the Diagnosis Assistant chat, ask:
#     "does no-probes-app have proper health checks?"
#
# HOW TO CLEAN UP:
#   kubectl delete -f 03-bad-probes-missing.yaml
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: no-probes-app
  namespace: default
  labels:
    app: no-probes-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: no-probes-app
  template:
    metadata:
      labels:
        app: no-probes-app
    spec:
      containers:
        - name: no-probes-app
          image: nginx:1.25
          ports:
            - containerPort: 80
          # No livenessProbe, no readinessProbe, no startupProbe configured.
          # This is a common real-world mistake — the pod will run but
          # Kubernetes has no way to detect application-level failures.