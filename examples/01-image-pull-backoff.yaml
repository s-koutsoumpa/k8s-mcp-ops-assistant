# =============================================================================
# Example 1: ImagePullBackOff
# =============================================================================
#
# WHAT THIS TESTS:
#   Kubernetes cannot pull the container image because the tag does not exist.
#   The pod will be stuck in ImagePullBackOff / ErrImagePull state.
#
# EXPECTED AGENT BEHAVIOUR (Workflow 2):
#   1. analyze_deployment is called and identifies the image pull failure
#   2. The agent explains the cause and asks for a valid image:tag
#   3. After the user provides (e.g.) "nginx:1.25", execute_action is called
#      with update_image
#   4. analyze_deployment is called again and reports a healthy state
#
# HOW TO APPLY:
#   kubectl apply -f 01-image-pull-backoff.yaml
#
# HOW TO TRIGGER THE AGENT:
#   In the Diagnosis Assistant chat, ask:
#     "why is broken-image-app failing?"
#
# HOW TO CLEAN UP:
#   kubectl delete -f 01-image-pull-backoff.yaml
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-image-app
  namespace: default
  labels:
    app: broken-image-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broken-image-app
  template:
    metadata:
      labels:
        app: broken-image-app
    spec:
      containers:
        - name: broken-image-app
          # This tag does not exist and will fail to pull
          image: nginx:this-tag-does-not-exist-v999
          ports:
            - containerPort: 80