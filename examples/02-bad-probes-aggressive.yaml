apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-probes-app
  namespace: default
  labels:
    app: bad-probes-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bad-probes-app
  template:
    metadata:
      labels:
        app: bad-probes-app
    spec:
      containers:
        - name: bad-probes-app
          image: nginx:1.25
          ports:
            - containerPort: 80

          # Deliberately slow the container's startup.
          # Nginx will not serve requests until the 20-second sleep finishes.
          command:
            - sh
            - -c
            - "sleep 20 && nginx -g 'daemon off;'"

          # Readiness probe: will fail because nginx is asleep for 20s
          # and we give it only 2s before the first check.
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            timeoutSeconds: 1
            periodSeconds: 2
            failureThreshold: 1

          # Liveness probe: will fail for the same reason, causing
          # Kubernetes to restart the container repeatedly.
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            timeoutSeconds: 1
            periodSeconds: 2
            failureThreshold: 2

          # No startupProbe — that's part of what the agent should suggest adding.
