# =============================================================================
# Example 4: CPU pressure (throttling)
# =============================================================================
#
# WHAT THIS TESTS:
#   A container that burns CPU continuously but has an artificially low CPU
#   limit (100m = 0.1 cores). Kubernetes throttles the container, causing
#   the workload to run slowly even though it has plenty of work to do.
#
#   This reproduces the "cpu_pressure" resource profile in analyze_resources.
#
# REQUIREMENTS:
#   metrics-server must be installed in the cluster for get_pod_metrics to work.
#   On Minikube:
#     minikube addons enable metrics-server
#   Verify with:
#     kubectl top pods
#
# EXPECTED AGENT BEHAVIOUR (Workflow 2):
#   1. analyze_deployment flags the deployment as stressed (after a minute or
#      two of metrics collection)
#   2. analyze_resources classifies the profile as "cpu_pressure" and returns
#      a suggestedResources block with higher CPU limits
#   3. After user approval, execute_action patches the resources
#   4. analyze_deployment is called again and confirms improvement
#
# HOW TO APPLY:
#   kubectl apply -f 04-cpu-pressure.yaml
#   # wait ~60 seconds for metrics-server to collect data
#
# HOW TO TRIGGER THE AGENT:
#   In the Diagnosis Assistant chat, ask:
#     "does nginx-cpu-stress need more resources?"
#
# HOW TO CLEAN UP:
#   kubectl delete -f 04-cpu-pressure.yaml
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-cpu-stress
  namespace: default
  labels:
    app: nginx-cpu-stress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-cpu-stress
  template:
    metadata:
      labels:
        app: nginx-cpu-stress
    spec:
      containers:
        - name: nginx-cpu-stress
          # A small image with a shell, so we can run CPU-burning loops
          image: polinux/stress
          # Burn 2 CPU workers continuously forever
          command:
            - stress
            - --cpu
            - "2"
            - --verbose
            - --timeout
            - "3600s"

          resources:
            requests:
              # Reserve very little
              cpu: "50m"
              memory: "32Mi"
            limits:
              # Hard cap far below what 2 stress workers want.
              # This causes sustained CPU throttling.
              cpu: "100m"
              memory: "64Mi"