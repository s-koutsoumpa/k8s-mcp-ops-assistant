# =============================================================================
# Example 5: OOMKilled (out-of-memory)
# =============================================================================
#
# WHAT THIS TESTS:
#   A container that allocates more memory than its hard memory limit allows.
#   Kubernetes kills the container with exit code 137 (OOMKilled) and
#   restarts it. The pod enters a restart loop visible in events and
#   container status.
#
#   This reproduces the "memory_pressure" resource profile in analyze_resources
#   and the OOMKilled detection branch in analyzer.ts.
#
# REQUIREMENTS:
#   metrics-server must be installed (same as example 4).
#
# EXPECTED AGENT BEHAVIOUR (Workflow 2):
#   1. analyze_deployment detects restarts and OOMKilled reason in events
#   2. analyze_resources classifies the profile as "memory_pressure" and
#      returns a suggestedResources block with higher memory limits
#   3. After user approval, execute_action patches the resources
#   4. analyze_deployment is called again and confirms recovery
#
# HOW TO APPLY:
#   kubectl apply -f 05-oomkilled.yaml
#   # wait ~30 seconds for the first OOMKill to happen
#
# HOW TO TRIGGER THE AGENT:
#   In the Diagnosis Assistant chat, ask:
#     "why does memory-hog keep restarting?"
#
# HOW TO CLEAN UP:
#   kubectl delete -f 05-oomkilled.yaml
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-hog
  namespace: default
  labels:
    app: memory-hog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memory-hog
  template:
    metadata:
      labels:
        app: memory-hog
    spec:
      containers:
        - name: memory-hog
          # stress-ng lets us allocate specific amounts of memory
          image: polinux/stress
          # Allocate 128 MiB of memory, which exceeds the 64Mi limit below
          command:
            - stress
            - --vm
            - "1"
            - --vm-bytes
            - "128M"
            - --vm-hang
            - "60"
            - --verbose

          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              # Hard memory cap far below what the process tries to allocate.
              # The kernel will kill the process with OOMKilled.
              memory: "64Mi"