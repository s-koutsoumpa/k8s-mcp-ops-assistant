# =============================================================================
# Example 6: CrashLoopBackOff with application-level error
# =============================================================================
#
# WHAT THIS TESTS:
#   The container starts, prints an error message to stdout, then exits with
#   a non-zero code. Kubernetes restarts it, but the same thing happens on
#   every restart. The pod enters CrashLoopBackOff.
#
#   Importantly, Kubernetes events will NOT clearly explain the root cause
#   (no ImagePullBackOff, no OOMKilled, no probe failures). The ONLY way to
#   discover the real cause is by reading the container logs.
#
#   This reproduces the critical scenario where get_pod_logs is essential —
#   without it, Workflow 2 cannot diagnose this failure.
#
# EXPECTED AGENT BEHAVIOUR (Workflow 2):
#   1. analyze_deployment shows high restart counts but no probe or image
#      issues
#   2. The agent realises the root cause is unclear from events alone and
#      decides to read the logs
#   3. inspect_pods is called to find the pod name
#   4. get_pod_logs is called with that pod name
#   5. The agent summarises the log output ("ECONNREFUSED to postgres") and
#      tells the user this is an application-level issue, not a Kubernetes
#      issue
#   6. The agent suggests the user investigate the database connection
#
# HOW TO APPLY:
#   kubectl apply -f 06-crashloop-app-error.yaml
#
# HOW TO TRIGGER THE AGENT:
#   In the Diagnosis Assistant chat, ask:
#     "why does db-client-app keep crashing?"
#
# HOW TO CLEAN UP:
#   kubectl delete -f 06-crashloop-app-error.yaml
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-client-app
  namespace: default
  labels:
    app: db-client-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-client-app
  template:
    metadata:
      labels:
        app: db-client-app
    spec:
      containers:
        - name: db-client-app
          # A minimal image with a shell
          image: busybox:1.36
          # Simulate an application that crashes because it cannot reach its
          # database. The log line is deliberately specific so the agent has
          # a clear signal to report back.
          command:
            - sh
            - -c
            - |
              echo "[INFO] Starting application..."
              sleep 2
              echo "[ERROR] Failed to connect to database: ECONNREFUSED 127.0.0.1:5432"
              echo "[FATAL] Cannot continue without database connection. Exiting."
              exit 1